{% extends "base.html" %}
{% block title %}{{ titulo }} — MaqControl{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto fade-up">
  <div class="flex items-center gap-4 mb-6">
    <a href="/setores/" class="text-slate-400 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-white">{{ titulo }}</h1>
      <p class="text-slate-400 text-sm">Preencha os dados do setor</p>
    </div>
  </div>

  {% if erro %}
  <div class="mb-4 px-4 py-3 rounded-xl bg-red-500/15 border border-red-500/30 text-red-300 text-sm">⚠ {{ erro }}</div>
  {% endif %}

  <form method="post" class="glass rounded-2xl p-6 space-y-5">
    <div>
      <label class="text-xs text-slate-400 mb-1 block">Nome do Setor *</label>
      <input type="text" name="nome" required value="{{ setor.nome if setor else '' }}" placeholder="Ex: Administrativo, TI, Produção…" class="input-glass"/>
    </div>
    <div>
      <label class="text-xs text-slate-400 mb-1 block">Descrição</label>
      <textarea name="descricao" rows="2" placeholder="Descrição opcional do setor…" class="input-glass resize-none">{{ setor.descricao or '' if setor else '' }}</textarea>
    </div>
    <div>
      <label class="text-xs text-slate-400 mb-1 block">Intervalo de Manutenção Padrão (dias)</label>
      <input type="number" name="intervalo_manutencao_dias" min="1" max="3650"
        value="{{ setor.intervalo_manutencao_dias if setor else 90 }}" class="input-glass"/>
      <p class="text-xs text-slate-500 mt-1">Máquinas do setor sem intervalo próprio usarão este valor.</p>
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Salvar
      </button>
      <a href="/setores/" class="btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
