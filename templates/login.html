<!DOCTYPE html>
<html lang="pt-BR" class="h-full" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MaqControl</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Sora + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <script>
    // Configuração Tailwind customizada
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Sora', 'sans-serif'], body: ['Inter', 'sans-serif'] },
          colors: {
            verde: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
              300: '#86efac', 400: '#4ade80', 500: '#22c55e',
              600: '#16a34a', 700: '#15803d', 800: '#166534',
              900: '#14532d', 950: '#052e16',
            }
          },
          backdropBlur: { xs: '2px' },
        }
      }
    }

      // Carrega tema salvo
      (function () {
        const savedTheme = localStorage.getItem('maqcontrol-theme');
        if (savedTheme === 'light') {
          document.documentElement.classList.add('light');
        }
      })();
  </script>

  <style>
    /* ── Variáveis de tema ── */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .light {
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-border: rgba(255, 255, 255, 0.7);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    /* ── Fundo ── */
    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      background: #0a1a0f;
      position: relative;
      overflow-x: hidden;
    }

    .light body,
    body.light-bg {
      background: #e8f5ee;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Glassmorphism ── */
    .glass-login {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 1.5rem;
    }

    /* ── Inputs ── */
    .input-glass {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #f1f5f9;
      border-radius: 10px;
      padding: 0.6rem 1rem;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input-glass:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    .input-glass::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* ── Botões ── */
    .btn-primary {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      padding: 0.65rem 1.4rem;
      border-radius: 10px;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ── Light mode overrides ── */
    html.light .input-glass {
      background: rgba(255, 255, 255, 0.6);
      border-color: rgba(0, 0, 0, 0.15);
      color: #1a2e1a;
    }

    html.light .input-glass::placeholder {
      color: rgba(0, 0, 0, 0.35);
    }

    html.light .text-dynamic {
      color: #334155;
    }

    html.light h1.text-verde-400 {
      color: #15803d;
    }

    /* ── Animações ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>

<body class="h-full flex items-center justify-center text-slate-100">

  <!-- Fundo animado (reutilizado) -->
  <canvas id="bg-canvas"></canvas>

  <div class="relative z-10 w-full max-w-md px-6 fade-up">
    <div class="glass-login p-8 md:p-10">
      <div class="flex flex-col items-center mb-8">
        <div
          class="w-20 h-20 rounded-2xl bg-white/5 p-2 shadow-lg mb-4 hover:scale-105 transition-transform cursor-pointer"
          onclick="toggleThemeVisual()" title="Clique para testar Modo Claro">
          <!-- Ideal seria ter uma logo em base64 ou link relativo, usaremos logo estática -->
          <img src="/static/empresa.png" alt="Logo MaqControl" class="w-full h-full object-contain drop-shadow-md">
        </div>
        <h1 class="text-2xl font-bold text-verde-400">MaqControl</h1>
        <p class="text-sm text-slate-400 text-dynamic mt-1">Acesso ao Sistema</p>
      </div>

      <!-- Erros de login -->
      {% if error %}
      <div
        class="bg-red-500/20 border border-red-500/50 text-red-200 text-sm p-3 rounded-lg flex items-center gap-2 mb-6 animate-pulse">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form action="/login" method="POST" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 text-dynamic mb-1.5 ml-1">Usuário /
            E-mail</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input type="text" id="email" name="email" required placeholder="Ex: admin" class="input-glass pl-10"
              autofocus>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 text-dynamic mb-1.5 ml-1">Senha</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input type="password" id="password" name="password" required placeholder="Insira sua senha"
              class="input-glass pl-10">
          </div>
          <div class="flex justify-end mt-1.5">
            <a href="#" class="text-xs text-verde-400 hover:text-verde-300 transition-colors font-medium">Esqueceu a
              senha?</a>
          </div>
        </div>

        <button type="submit" class="btn-primary mt-4 shadow-lg shadow-verde-500/20">
          Entrar no Sistema
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>
      </form>
    </div>

    <div class="text-center mt-8 text-xs text-slate-500 font-medium">
      &copy; 2026 MaqControl. Gestão inteligente de TI.
    </div>
  </div>

  <script>
    // ── Fundo animado ────────────────────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let blobs = [];
      const DARK_BG = '#0a1a0f', LIGHT_BG = '#e8f5ee';

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function initBlobs() {
        blobs = Array.from({ length: 6 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: 200 + Math.random() * 300,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          color: ['#16a34a', '#15803d', '#166534', '#14532d', '#052e16', '#22c55e'][Math.floor(Math.random() * 6)],
          opacity: 0.12 + Math.random() * 0.12,
        }));
      }

      function draw() {
        const isLight = document.documentElement.classList.contains('light');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = isLight ? LIGHT_BG : DARK_BG;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        blobs.forEach(b => {
          const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
          grd.addColorStop(0, b.color + Math.floor(b.opacity * 255).toString(16).padStart(2, '0'));
          grd.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = grd;
          ctx.fill();

          b.x += b.vx; b.y += b.vy;
          if (b.x < -b.r) b.x = canvas.width + b.r;
          if (b.x > canvas.width + b.r) b.x = -b.r;
          if (b.y < -b.r) b.y = canvas.height + b.r;
          if (b.y > canvas.height + b.r) b.y = -b.r;
        });
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize(); initBlobs(); draw();
    })();

    // Helper visual para o usuário testar o tema clicando na logo
    function toggleThemeVisual() {
      const html = document.documentElement;
      const isLight = html.classList.toggle('light');
      localStorage.setItem('maqcontrol-theme', isLight ? 'light' : 'dark');
    }
  </script>
</body>

</html>
